<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics SVG Illustration</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
      }
      .card {
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 10px;
      }
      svg {
        width: min(92vw, 700px);
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="600"
        height="600"
        viewBox="0 0 600 600"
      >
        <defs>
          <marker
            id="arrow"
            markerWidth="12"
            markerHeight="12"
            refX="10"
            refY="6"
            orient="auto"
            markerUnits="strokeWidth"
          >
            <path d="M0,0 L12,6 L0,12 Z" fill="#1f4e79" />
          </marker>
          <style>
            .title {
              font:
                bold 24px Arial,
                sans-serif;
              fill: #111;
            }
            .label {
              font:
                18px Arial,
                sans-serif;
              fill: #111;
            }
            .math {
              font:
                italic 20px Georgia,
                serif;
              fill: #111;
            }
            .small {
              font:
                15px Arial,
                sans-serif;
              fill: #333;
            }
            .upper {
              fill: #d9e8fb;
              stroke: #355c7d;
              stroke-width: 3;
            }
            .lower {
              fill: #cfe8cf;
              stroke: #3d6b35;
              stroke-width: 3;
            }
            .surface {
              stroke: #444;
              stroke-width: 5;
            }
            .gline {
              stroke: #444;
              stroke-width: 5;
            }
            .ghead {
              fill: #444;
            }
          </style>
        </defs>

        <text x="40" y="50" class="title">
          Acceleration and Forces for Two Stacked Blocks
        </text>

        <!-- horizontal surface -->
        <line x1="80" y1="540" x2="520" y2="540" class="surface" />
        <text x="500" y="525" class="small">
          horizontal surface (frictionless)
        </text>

        <!-- larger block -->
        <rect x="200" y="470" width="220" height="70" rx="8" class="lower" />
        <text x="310" y="500" class="label">larger block</text>
        <text x="420" y="492" class="math">m₂ = 5 kg</text>

        <!-- small block -->
        <rect x="250" y="440" width="120" height="30" rx="8" class="upper" />
        <text x="300" y="460" class="label">small block</text>
        <text x="260" y="470" class="math">m₁ = 2 kg</text>

        <!-- applied force on larger block -->
        <line
          x1="150"
          y1="500"
          x2="250"
          y2="500"
          stroke="#1f4e79"
          stroke-width="6"
          marker-end="url(#arrow)"
        />
        <text x="130" y="495" class="math">F = 21 N</text>

        <!-- gravity acting on both blocks -->
        <line x1="300" y1="460" x2="300" y2="540" class="gline" />
        <polygon points="300,560 280,540 320,540" class="ghead" />
        <text x="330" y="540" class="math">g = 9.8 m/s²</text>

        <!-- condition for moving together -->
        <text x="250" y="425" class="small">
          move together without slipping
        </text>

        <!-- assumption about friction between blocks -->
        <text x="80" y="580" class="small">
          Assume sufficient friction between blocks
        </text>
      </svg>
    </div>
  </body>
</html>
