<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1f4e79" />
    </marker>
    <style>
      .title { font: bold 24px Arial, sans-serif; fill: #111; }
      .label { font: 18px Arial, sans-serif; fill: #111; }
      .math { font: italic 20px Georgia, serif; fill: #111; }
      .small { font: 15px Arial, sans-serif; fill: #333; }
      .upper { fill: #d9e8fb; stroke: #355c7d; stroke-width: 3; }
      .lower { fill: #cfe8cf; stroke: #3d6b35; stroke-width: 3; }
      .surface { stroke: #444; stroke-width: 5; }
      .gline { stroke: #444; stroke-width: 5; }
      .ghead { fill: #444; }
    </style>
  </defs>

  <text x="40" y="50" class="title">Two Stacked Blocks</text>

  <!-- table -->
  <line x1="80" y1="420" x2="860" y2="420" class="surface" />
  <text x="800" y="405" class="label">table</text>

  <!-- lower block -->
  <rect x="270" y="300" width="360" height="120" rx="8" class="lower" />
  <text x="390" y="365" class="label">lower block</text>
  <text x="405" y="392" class="math">m₂ = 4.2 kg</text>

  <!-- upper block -->
  <rect x="360" y="200" width="180" height="100" rx="8" class="upper" />
  <text x="406" y="252" class="label">upper block</text>
  <text x="418" y="278" class="math">m₁ = 1.8 kg</text>

  <!-- applied force on lower block -->
  <line x1="120" y1="360" x2="250" y2="360" stroke="#1f4e79" stroke-width="6" marker-end="url(#arrow)" />
  <text x="85" y="350" class="math">F</text>

  <!-- gravity direction -->
  <line x1="500" y1="455" x2="500" y2="505" class="gline" />
  <polygon points="500,525 470,505 530,505" class="ghead" />
  <text x="515" y="488" class="math">g</text>

  <!-- optional contact property -->
  <text x="80" y="475" class="small">μₛ = 0.35 between upper block and lower block</text>
  <text x="80" y="500" class="small">find maximum F so the blocks move together without slipping</text>
</svg>
