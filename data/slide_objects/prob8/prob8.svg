<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="620" viewBox="0 0 1020 620">
  <defs>
    <style>
      .title { font: bold 24px Arial, sans-serif; fill: #111; }
      .label { font: 18px Arial, sans-serif; fill: #111; }
      .math { font: italic 20px Georgia, serif; fill: #111; }
      .small { font: 15px Arial, sans-serif; fill: #333; }
      .hill-fill { fill: #d9e8fb; }
      .hill-edge { stroke: #355c7d; stroke-width: 3; fill: none; }
      .truck-body { fill: #f4f1e6; stroke: #777; stroke-width: 2.5; }
      .truck-cab { fill: #e8f3d6; stroke: #6d8c3c; stroke-width: 2.5; }
      .wheel { fill: #444; }
      .surface { stroke: #666; stroke-width: 5; }
      .gline { stroke: #444; stroke-width: 5; }
      .ghead { fill: #444; }
    </style>
  </defs>

  <text x="40" y="50" class="title">Truck Driving Up a Hill</text>

  <line x1="60" y1="520" x2="960" y2="520" class="surface" />
  <text x="820" y="498" class="label">horizontal surface</text>

  <polygon points="120,520 620,520 620,260" class="hill-fill" />
  <line x1="120" y1="520" x2="620" y2="260" class="hill-edge" />
  <line x1="120" y1="520" x2="620" y2="520" class="hill-edge" />
  <text x="420" y="430" class="label">hill</text>

  <g transform="translate(340,382) rotate(-27.5)">
    <rect x="-70" y="-24" width="95" height="40" rx="4" class="truck-body" />
    <rect x="20" y="-18" width="42" height="34" rx="4" class="truck-cab" />
    <circle cx="-35" cy="22" r="10" class="wheel" />
    <circle cx="35" cy="22" r="10" class="wheel" />
    <text x="-15" y="-35" class="label">truck</text>
  </g>
  <text x="334" y="327" class="math">m</text>

  <line x1="340" y1="405" x2="340" y2="470" class="gline" />
  <polygon points="340,490 315,470 365,470" class="ghead" />
  <text x="356" y="448" class="math">g</text>

  <text x="520" y="495" class="math">θ</text>
</svg>